<header class="site-header">
  <div class="wrap">
    <div class="header-inner">
    <a class="brand" href="/" aria-label="SecretPub, retour à l'accueil">
      <img src="/assets/logo-full.png" alt="Logo SecretPub, signalétique, print et textile à Valence" />
    </a>
    <nav class="nav" aria-label="Navigation principale">
      {{#nav}}
      <div class="nav-item"><a href="{{href}}">{{label}}</a></div>
      {{/nav}}
    </nav>
    <div class="header-cta">
      <a href="{{meta.catalogueUrl}}" target="_blank" rel="noopener" class="btn btn-glow">Catalogue <span class="ext" aria-hidden="true">↗</span></a>
      <a href="#contact" class="btn btn-primary">{{headerCtaLabel}}</a>
      <button class="burger" id="burger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    </div>
  </div>
</header>
<div class="menu-overlay" id="menuOverlay"></div>
<div class="mobile-menu" id="mobileMenu">
  <button class="menu-close" id="menuClose" aria-label="Fermer le menu">×</button>
  {{#nav}}
  <a href="{{href}}">{{label}}</a>
  {{/nav}}
  <a href="{{meta.catalogueUrl}}" target="_blank" rel="noopener" class="btn btn-glow">Catalogue <span class="ext" aria-hidden="true">↗</span></a>
  <a href="#contact" class="btn btn-primary">{{headerCtaLabel}}</a>
  <div class="mm-contact">
    <a class="mm-tel" href="{{meta.phoneHref}}"><svg class="mm-tel-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>{{meta.phoneDisplay}}</a>
    <address class="mm-addr">{{meta.addressLine}}</address>
  </div>
</div>
