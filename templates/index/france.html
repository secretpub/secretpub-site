<!-- PARTOUT EN FRANCE (carte animée) -->
<section class="section france" id="france" data-screen-label="Partout en France">
  <div class="wrap">
    <div class="section-head reveal">
      <span class="eyebrow">{{france.eyebrow}}</span>
      <h2>{{france.title}}</h2>
      <p class="lead">{{france.lead}}</p>
    </div>
    <div class="france-grid">
      <div class="reveal">
        <div class="fr-services">
          {{#france.services}}
          <div class="fr-service"><span class="fs-c">{{{iconHtml}}}</span><div><div class="fs-t">{{title}}</div><div class="fs-d">{{desc}}</div></div></div>
          {{/france.services}}
        </div>
        <div class="fr-stat">
          {{#france.stats}}
          <div><div class="n">{{n}}</div><div class="l">{{label}}</div></div>
          {{/france.stats}}
        </div>
      </div>
      <div class="france-map reveal" id="franceMap" role="img" aria-label="Carte de France : villes livrées et posées par SecretPub">
